name: Continuous Integration

on:
  push:
  pull_request:
    branches: [ master]

permissions:
  contents: read  #  to fetch code (actions/checkout)

jobs:
  linux:
    name: Linux 
    runs-on: ubuntu-22.04

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
            submodules: 'true'

      - name: Install .NET 8.0 and .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
         dotnet-version: | 
            8.0.x
            10.0.x

      - name: Build
        run: |
          dotnet clean yac8i.gui.sdl/yac8i.gui.sdl.csproj -c Debug --nologo --verbosity minimal 
          dotnet build yac8i.gui.sdl/yac8i.gui.sdl.csproj -c Debug -nologo -warnaserror
          dotnet test yac8i.tests/yac8i.tests.csproj -c Debug -nologo -warnaserror

  windows:
    name: Windows
    runs-on: windows-2022

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
            submodules: 'true'

      - name: Install .NET 8.0 and .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: | 
            8.0.x
            10.0.x
      - name: Build
        shell: powershell
        run: |
          dotnet clean yac8i.gui.sdl/yac8i.gui.sdl.csproj -c Debug --nologo --verbosity minimal 
          dotnet build yac8i.gui.sdl/yac8i.gui.sdl.csproj -c Debug -nologo -warnaserror
          dotnet test yac8i.tests/yac8i.tests.csproj -c Debug -nologo -warnaserror
